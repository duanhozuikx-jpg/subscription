mixed-port: 7890
tproxy-port: 7891
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true
keep-alive-interval: 30
find-process-mode: strict
external-controller: 0.0.0.0:9090
secret: ""
profile:
  store-selected: true
  store-fake-ip: false
unified-delay: true
tcp-concurrent: true
geodata-mode: true
geox-url:
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
geo-auto-update: true
geo-update-interval: 24
global-ua: clash.meta
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - cloudflare-ech.com
    - edge.microsoft.com
  skip-domain:
    - Mijia Cloud

hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]

dns:
  enable: true
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  enhanced-mode: redir-host
  prefer-h3: true
  ipv6: true
  respect-rules: true
  nameserver:
    - https://cloudflare-dns.com/dns-query#proxy=🔥AUTO
  nameserver-policy:
    geosite:cn:
      - 223.5.5.5
      - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  fallback:
    - https://dns.alidns.com/dns-query
  fallback-filter:
      geoip: false
      ipcidr: []
      domain: []

proxy-groups:
  - name: 🗽SELECT
    type: select
    include-all: true
    proxies:
      - 🔥AUTO
      - fallback
      - DIRECT
  - name: 🌀Google
    type: select
    include-all: true
    proxies:
      - 🗽SELECT
      - 🇺🇸US
      - 🇭🇰HK
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
  - name: ⌨️ AI
    type: select
    include-all: true
    exclude-filter: 🇭🇰|HKG|香港|中国
    proxies:
      - 🗽SELECT
      - 🇺🇸US
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
  - name: 📺 Media
    type: select
    include-all: true
    proxies:
      - 🗽SELECT
      - 🇺🇸US
      - 🇭🇰HK
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
  - name: ☁️Cloudflare
    type: select
    include-all: true
    exclude-filter: CF
    proxies:
      - 🗽SELECT
      - fallback
      - DIRECT
  - name: 📱Telegram
    type: select
    include-all: true
    exclude-filter: CF
    proxies:
      - fallback
      - 🗽SELECT
  - name: 🗃Storage
    type: select
    include-all: true
    exclude-filter: CF
    proxies:
      - fallback
      - 🗽SELECT
  - name: 💼microsoft
    type: select
    include-all: true
    exclude-filter: CF
    proxies:
      - 🗽SELECT
      - DIRECT
  - name: 🌀Google-cn
    type: select
    proxies:
      - 🌀Google
      - DIRECT
      - 🗽SELECT
      - 🇺🇸US
      - 🇭🇰HK
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
  - name: 🧱墙内常用
    type: select
    proxies:
      - DIRECT
      - 🗽SELECT
      - 🇺🇸US
      - 🇭🇰HK
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
  - name: 📈speedtest
    type: select
    include-all: true
    proxies:
      - DIRECT
  - name: 🎵Spotify
    type: select
    proxies:
      - 🇺🇸US
      - 🇭🇰HK
      - 🇸🇬SG
      - 🇯🇵JP
      - 🇰🇷KR
      - 🇬🇧UK
      - 🇩🇪DE
      - 🇳🇱NL
      - 🇮🇪IE
      - 🇹🇷TR
      - 🇦🇺AU
      - DIRECT
  - name: 🎮Games
    type: select
    include-all: true
    filter: HY|MR
    proxies:
      - 🗽SELECT
      - DIRECT
      - 🇭🇰HK
  - name: ➡️全球直连
    type: select
    proxies:
      - DIRECT
      - 🗽SELECT
  - name: 🏴‍☠️全球拦截
    type: select
    proxies:
      - REJECT
      - 🗽SELECT
      - 🔥AUTO
      - DIRECT
  - name: 🇺🇸US
    type: url-test
    hidden: true
    url: https://cp.cloudflare.com
    lazy: true
    include-all: true
